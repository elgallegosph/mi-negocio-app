<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Fondo Rosa Claro y Marca de Agua */
        body {
            background-color: #fff0f5 !important; /* Rosa claro / Lavender Blush */
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: ""; position: fixed; top: 50%; left: 50%;
            width: 85%; height: 85%; max-width: 600px;
            background: url('./logo.png') no-repeat center;
            background-size: contain; transform: translate(-50%, -50%);
            opacity: 0.08; z-index: -1; pointer-events: none;
        }

        /* Pantalla de Portada (Splash) */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }
        #splash-screen img { width: 220px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Estilos de Elementos */
        .price-tag { font-size: 1.4rem; color: #d63384; font-weight: 800; display: block; margin-top: 4px; }
        .product-name { font-size: 1.1rem; font-weight: 600; color: #333; }
        
        .lista-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #eee; 
            background: rgba(255, 255, 255, 0.7); /* Transparencia para ver la marca de agua */
            margin-bottom: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            cursor: pointer; transition: background 0.3s;
        }
        .lista-item:hover { background: rgba(255, 255, 255, 0.9); }
        
        .venta-form, .chart-card, .catalog-card {
            background: rgba(255, 255, 255, 0.85); /* Transparencia elegante */
            padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        .chart-container { position: relative; height: 300px; width: 100%; }
        .search-sales { width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #fce4ec; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-disabled { background: #ccc !important; cursor: not-allowed !important; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="./logo.png" alt="Amare Beauty Logo">
        <h1 style="color: #d63384; margin-top: 20px; font-family: 'Segoe UI', sans-serif;">Amare Beauty</h1>
    </div>

    <div class="app-container">
        <header>
            <h1>Amare Beauty</h1>
            <div class="total-ventas-banner">
                <small>VENTA TOTAL REAL</small>
                <h2 id="gran-total-dinero">$0</h2>
            </div>
            <nav class="tabs">
                <button onclick="switchTab('inventario')" id="tab-inventario" class="active">Inventario</button>
                <button onclick="switchTab('ventas')" id="tab-ventas">Ventas</button>
                <button onclick="switchTab('stats')" id="tab-stats">Estadísticas</button>
                <button onclick="switchTab('catalogo')" id="tab-catalogo">📖 Catálogo</button>
            </nav>
        </header>

        <main>
            <section id="sec-inventario" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                    <button onclick="cargarDesdeDrive()" id="sync-btn">🔄</button>
                </div>
                <ul id="lista-inventario" style="list-style: none; padding: 0;"></ul>
            </section>

            <section id="sec-ventas" class="tab-content" style="display:none;">
                <div class="venta-form">
                    <label>🔍 Producto Seleccionado:</label>
                    <input type="text" id="busqueda-venta" class="search-sales" placeholder="Escribe para buscar..." onkeyup="filtrarSelectVentas()">
                    <select id="select-producto" size="5" style="width:100%; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;" onchange="validarStockSeleccionado()"></select>
                    
                    <label>Cantidad:</label><input type="number" id="cant-venta" value="1" min="1" oninput="validarStockSeleccionado()">
                    <label>Método de Pago:</label>
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Separado">📦 Separado</option>
                        <option value="Fiado">📝 Fiado</option>
                    </select>
                    
                    <div style="margin-top:15px; border-left: 4px solid #d63384; padding-left: 15px;">
                        <label>Cliente:</label><input type="text" id="nombre-cliente" placeholder="Nombre">
                        <label>WhatsApp:</label><input type="tel" id="tel-cliente" placeholder="300...">
                    </div>
                    <button id="btn-registrar-final" onclick="registrarVenta()" class="btn-save" style="margin-top:20px;">REGISTRAR VENTA Y PDF</button>
                </div>
            </section>

            <section id="sec-stats" class="tab-content" style="display:none; padding: 15px;">
                <div class="chart-card" style="margin-bottom:20px;">
                    <h3 style="text-align:center; color:#d63384;">📊 Métodos de Pago</h3>
                    <div class="chart-container"><canvas id="canvasMetodos"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3 style="text-align:center; color:#6610f2;">🏆 Top 5 Productos</h3>
                    <div class="chart-container"><canvas id="canvasTop5"></canvas></div>
                </div>
            </section>

            <section id="sec-catalogo" class="tab-content" style="display:none; padding: 20px;">
                <div class="catalog-card">
                    <h2 style="color: #d63384;">Gestión de Catálogo</h2>
                    <p>Visualiza el PDF actual o compártelo con tus clientes.</p>
                    <button onclick="verCatalogo()" class="btn-save" style="background: #6610f2; width: auto; padding: 15px 30px; margin-bottom: 10px;">VER PDF ACTUAL</button>
                    
                    <div class="marketing-section" style="margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px;">
                        <h3 style="color: #25d366;">🚀 Marketing de WhatsApp</h3>
                        <p style="font-size: 0.9rem; color: #666;">Envía el catálogo a todos tus clientes registrados automáticamente.</p>
                        <button onclick="enviarMarketingMasivo()" class="btn-save" style="background: #25d366; border: none;">ENVIAR CATÁLOGO A CLIENTES</button>
                        <p id="status-marketing" style="margin-top: 10px; font-weight: bold;"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
