<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMARE BEAUTY</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #d63384; --dark: #2c3e50; --bg: #fff0f5; }
        body { background-color: var(--bg); margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative; overflow-x: hidden; }
        
        /* MARCA DE AGUA CORPORATIVA */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 85vw; height: 85vw;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.12; z-index: -1; pointer-events: none;
        }

        header { background: var(--dark); color: white; padding: 25px 15px 10px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .banner-total { background: linear-gradient(135deg, var(--primary), #ff6eb4); padding: 18px; border-radius: 20px; margin: 10px auto; width: 85%; }
        
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 15px; }
        .tabs button { padding: 12px 2px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; cursor: pointer; }
        .tabs button.active { background: var(--primary) !important; box-shadow: 0 4px 10px rgba(214,51,132,0.4); }

        .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-radius: 25px; padding: 20px; margin: 15px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .lista-item { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(214,51,132,0.1); }
        .sin-stock { opacity: 0.5; filter: grayscale(1); }

        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; background: white; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        #carrito-conteo { background: white; color: var(--primary); padding: 2px 7px; border-radius: 50%; font-size: 0.7rem; margin-left: 4px; font-weight: bold; }
        
        #splash-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="./logo.png" style="width:160px; filter: drop-shadow(0 0 10px rgba(214,51,132,0.3));">
        <h2 style="color:var(--primary); margin-top:20px; letter-spacing:2px;">AMARE BEAUTY</h2>
    </div>

    <header>
        <h1 style="margin:0;">AMARE BEAUTY</h1>
        <div class="banner-total"><small>VALOR TOTAL VENTAS</small><h2 id="gran-total-dinero">$0</h2></div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">STOCK</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">CARRITO <span id="carrito-conteo">0</span></button>
            <button onclick="switchTab('stats')" id="tab-stats">REPORTE</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">GESTIÓN</button>
        </nav>
    </header>

    <main>
        <section id="sec-inventario" class="tab-content">
            <div style="padding:15px;"><input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="renderInventario()"></div>
            <div id="lista-inventario" style="padding: 0 15px;"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <h3>🛒 Detalle Pedido</h3>
                <div id="items-en-carrito"></div>
                <hr>
                <input type="text" id="nombre-cliente" placeholder="Nombre Cliente">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp Celular">
                <select id="metodo-pago">
                    <option value=" Efectivo">Efectivo</option>
                    <option value=" Transferencia">Transferencia</option>
                    <option value=" Separado">Separado</option>
                    <option value=" Fiado">Fiado</option>
                </select>
                <button id="btn-procesar" onclick="registrarVentaMultiple()" class="btn-main">PROCESAR Y ENVIAR</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><h3>📈 Rendimiento de Pagos</h3><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card"><h3>⚠️ Deudas y Pendientes</h3><div id="lista-gestion"></div></div>
            <div class="card" style="background:var(--dark); text-align:center;">
                <button onclick="window.open('https://canva.link/6efvhh4xah3pndl', '_blank')" style="background:white; color:var(--dark); width:100%; border:none; padding:12px; border-radius:12px; font-weight:bold; margin-bottom:12px;">VER CATÁLOGO</button>
                <button onclick="marketingMasivo()" style="background:#25d366; color:white; width:100%; border:none; padding:12px; border-radius:12px; font-weight:bold;">ENVÍO MASIVO WHATSAPP</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
