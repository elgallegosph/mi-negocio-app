<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* FONDO ROSA CLARO TOTAL */
        html, body {
            background-color: #fff0f5 !important; 
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* MARCA DE AGUA FIJA PARA TODAS LAS PESTAÑAS */
        body::before {
            content: ""; 
            position: fixed; 
            top: 50%; 
            left: 50%;
            width: 90%; 
            height: 90%; 
            max-width: 600px;
            background: url('./logo.png') no-repeat center;
            background-size: contain; 
            transform: translate(-50%, -50%);
            opacity: 0.12; /* Ajuste para que se note pero no moleste */
            z-index: -1; 
            pointer-events: none;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff0f5; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #splash-screen img { width: 220px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* Ajuste de transparencia para ver la marca de agua */
        .tab-content { background: transparent !important; }
        
        .lista-item { 
            background: rgba(255, 255, 255, 0.65) !important; /* Más transparente */
            backdrop-filter: blur(2px);
            margin-bottom: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .venta-form, .chart-card, .catalog-card {
            background: rgba(255, 255, 255, 0.75) !important;
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 25px;
        }

        .price-tag { font-size: 1.4rem; color: #d63384; font-weight: 800; }
        .btn-disabled { background: #ccc !important; cursor: not-allowed !important; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="./logo.png" alt="Logo">
        <h1 style="color: #d63384; margin-top: 20px;">Amare Beauty</h1>
    </div>

    <div class="app-container">
        <header>
            <h1>Amare Beauty</h1>
            <div class="total-ventas-banner">
                <small>VENTA TOTAL REAL</small>
                <h2 id="gran-total-dinero">$0</h2>
            </div>
            <nav class="tabs">
                <button onclick="switchTab('inventario')" id="tab-inventario" class="active">Inventario</button>
                <button onclick="switchTab('ventas')" id="tab-ventas">Ventas</button>
                <button onclick="switchTab('stats')" id="tab-stats">Estadísticas</button>
                <button onclick="switchTab('catalogo')" id="tab-catalogo">📖 Catálogo</button>
            </nav>
        </header>

        <main>
            <section id="sec-inventario" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                    <button onclick="cargarDesdeDrive()" id="sync-btn">🔄</button>
                </div>
                <ul id="lista-inventario" style="list-style: none; padding: 0;"></ul>
            </section>

            <section id="sec-ventas" class="tab-content" style="display:none;">
                <div class="venta-form">
                    <h3 style="color:#d63384;">Registrar Venta</h3>
                    <input type="text" id="busqueda-venta" class="search-sales" placeholder="Buscar producto para vender..." onkeyup="filtrarSelectVentas()" style="width:100%; padding:10px; margin-bottom:10px;">
                    <select id="select-producto" size="5" style="width:100%; border-radius:10px; margin-bottom:15px;" onchange="validarStockSeleccionado()"></select>
                    
                    <label>Cantidad:</label><input type="number" id="cant-venta" value="1" min="1" oninput="validarStockSeleccionado()">
                    <label>Método de Pago:</label>
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Separado">📦 Separado</option>
                        <option value="Fiado">📝 Fiado</option>
                    </select>
                    
                    <div style="margin-top:20px;">
                        <input type="text" id="nombre-cliente" placeholder="Nombre del cliente">
                        <input type="tel" id="tel-cliente" placeholder="WhatsApp (ej: 300...)">
                    </div>
                    <button id="btn-registrar-final" onclick="registrarVenta()" class="btn-save" style="margin-top:20px;">GENERAR VENTA Y PDF</button>
                </div>
            </section>

            <section id="sec-stats" class="tab-content" style="display:none; padding: 15px;">
                <div class="chart-card">
                    <h3 style="text-align:center; color:#d63384;">📊 Resumen de Pagos</h3>
                    <div style="height: 300px;"><canvas id="canvasMetodos"></canvas></div>
                </div>
            </section>

            <section id="sec-catalogo" class="tab-content" style="display:none; padding: 20px;">
                <div class="catalog-card" style="text-align:center;">
                    <h2 style="color: #d63384;">Catálogo de Productos</h2>
                    <button onclick="verCatalogo()" class="btn-save" style="background: #6610f2;">VER PDF</button>
                    <hr style="margin: 30px 0; opacity: 0.2;">
                    <button onclick="enviarMarketingMasivo()" class="btn-save" style="background: #25d366;">ENVIAR CATÁLOGO POR WHATSAPP</button>
                    <p id="status-marketing"></p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
