<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Gestión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Amare Beauty</h1>
            <nav class="tabs">
                <button onclick="switchTab('inventario')" id="tab-inv" class="active">Inventario</button>
                <button onclick="switchTab('ventas')" id="tab-ven">Ventas</button>
            </nav>
        </header>

        <main>
            <section id="sec-inventario" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                    <button onclick="cargarDesdeDrive()">🔄</button>
                </div>
                <ul id="lista-inventario"></ul>
            </section>

            <section id="sec-ventas" class="tab-content" style="display:none;">
                <h3>Registrar Venta</h3>
                <div class="venta-form">
                    <select id="select-producto"></select>
                    <input type="number" id="cant-venta" value="1" min="1">
                    <button onclick="registrarVenta()" class="btn-save">VENDER Y ACTUALIZAR EXCEL</button>
                </div>
                <hr>
                <h3>Historial del día</h3>
                <ul id="lista-ventas"></ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
