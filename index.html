<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMARE BEAUTY</title>
    
    <meta name="theme-color" content="#0B3C5D">
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --primary: #0B3C5D; /* Azul Institucional */
            --accent: #F46036;  /* Naranja */
            --gold: #D4A017;    /* Dorado */
            --bg: #f4f7f6; 
        }
        
        body { background-color: var(--bg); margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative; }
        
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 85vw; height: 85vw;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.08; z-index: -1; pointer-events: none;
        }

        header { background: var(--primary); color: white; padding: 25px 15px 10px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .banner-total { background: linear-gradient(135deg, var(--accent), var(--gold)); padding: 18px; border-radius: 20px; margin: 10px auto; width: 85%; border: 1px solid rgba(255,255,255,0.3); }
        
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 15px; }
        .tabs button { padding: 12px 2px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; }
        .tabs button.active { background: var(--gold) !important; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .lista-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .sin-stock { opacity: 0.5; filter: grayscale(1); border-left-color: #ccc; }

        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn-sync { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        #carrito-conteo { background: var(--accent); color: white; padding: 2px 7px; border-radius: 50%; font-size: 0.7rem; margin-left: 4px; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        
        #splash-screen { position: fixed; inset: 0; background: var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="./logo.png" style="width:140px;"><h2>AMARE BEAUTY</h2></div>

    <header>
        <h1 style="margin:0; letter-spacing: 2px;">AMARE BEAUTY</h1>
        <div class="banner-total"><small>TOTAL RECAUDADO</small><h2 id="gran-total-dinero">$0</h2></div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">STOCK</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">VENTA <span id="carrito-conteo">0</span></button>
            <button onclick="switchTab('stats')" id="tab-stats">REPORTE</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">GESTIÓN</button>
        </nav>
    </header>

    <main>
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; padding:15px;">
                <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="renderInventario()" style="margin:0;">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario" style="padding: 0 15px;"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="color:var(--primary)">🛒 Checkout</h3>
                <div id="items-en-carrito"></div>
                <hr>
                <input type="text" id="nombre-cliente" placeholder="Nombre Cliente">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp (Ej: 300...)">
                <select id="metodo-pago">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Transferencia">Transferencia</option>
                    <option value="Separado">Separado</option>
                    <option value="Fiado">Fiado</option>
                </select>
                <button id="btn-procesar" onclick="registrarVentaMultiple()" class="btn-main">FINALIZAR VENTA</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><h3>📊 Distribución de Pagos</h3><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card"><h3>⚠️ Cuentas por Cobrar</h3><div id="lista-gestion"></div></div>
            <div class="card" style="background:var(--primary); text-align:center;">
                <button onclick="window.open('https://canva.link/6efvhh4xah3pndl', '_blank')" style="background:var(--gold); color:var(--primary); width:100%; border:none; padding:15px; border-radius:12px; font-weight:bold; margin-bottom:12px;">CATÁLOGO DIGITAL</button>
                <button onclick="marketingMasivo()" style="background:#25d366; color:white; width:100%; border:none; padding:15px; border-radius:12px; font-weight:bold;">MARKETING WHATSAPP</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
