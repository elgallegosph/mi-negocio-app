<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Gestión Total</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Amare Beauty</h1>
            <div class="total-ventas-banner">
                <small>VENTA TOTAL REAL</small>
                <h2 id="gran-total-dinero">$0</h2>
            </div>
            <nav class="tabs">
                <button onclick="switchTab('inventario')" id="tab-inventario" class="active">Inventario</button>
                <button onclick="switchTab('ventas')" id="tab-ventas">Ventas</button>
                <button onclick="switchTab('stats')" id="tab-stats">Estadísticas</button>
            </nav>
        </header>

        <main>
            <section id="sec-inventario" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                    <button onclick="cargarDesdeDrive()" id="sync-btn">🔄</button>
                </div>
                <ul id="lista-inventario"></ul>
            </section>

            <section id="sec-ventas" class="tab-content" style="display:none;">
                <div class="venta-form">
                    <label>Producto:</label><select id="select-producto"></select>
                    <label>Cantidad:</label><input type="number" id="cant-venta" value="1" min="1">
                    <label>Método de Pago:</label>
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Separado">📦 Separado</option>
                        <option value="Fiado">📝 Fiado</option>
                    </select>
                    <div class="cliente-box" style="margin-top:15px; border-left: 4px solid #d63384; padding-left: 15px;">
                        <label>Nombre Cliente:</label><input type="text" id="nombre-cliente" placeholder="Ej: Maria Lopez">
                        <label>WhatsApp:</label><input type="tel" id="tel-cliente" placeholder="3001234567">
                    </div>
                    <button onclick="registrarVenta()" class="btn-save" style="margin-top:20px;">REGISTRAR Y ENVIAR WHATSAPP</button>
                </div>
            </section>

            <section id="sec-stats" class="tab-content" style="display:none; padding: 15px;">
                <div class="chart-card">
                    <h3>📊 Métodos de Pago</h3>
                    <canvas id="canvasMetodos"></canvas>
                </div>
                <div class="chart-card" style="margin-top:25px;">
                    <h3>🏆 Top 5 Productos</h3>
                    <div style="height: 300px;"><canvas id="canvasTop5"></canvas></div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
