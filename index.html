<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard Integral</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #fff0f5; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 50px; }
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 90%; height: 90%; max-width: 800px;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.1; z-index: -1; pointer-events: none;
        }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .banner-total { background: #d63384; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; box-shadow: 0 4px 15px rgba(214,51,132,0.4); }
        .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .tabs button { padding: 12px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.3s; }
        .tabs button.active { background: #d63384 !important; box-shadow: 0 2px 8px rgba(214,51,132,0.4); }
        .card { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .lista-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #fce4ec; transition: 0.2s; }
        .btn-sync { background: #d63384; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; margin-top: 5px; }
        .tabla-gestion { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tabla-gestion th { background: #fce4ec; color: #d63384; padding: 10px; text-align: left; font-size: 0.8rem; border-radius: 5px; }
        .tabla-gestion td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .btn-accion { padding: 8px 12px; border-radius: 8px; border: none; color: white; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="./logo.png" style="width:180px;"><h2 style="color:#d63384;">Amare Beauty</h2></div>

    <header>
        <h1>Amare Beauty</h1>
        <div class="banner-total"><small>VENTA TOTAL REAL</small><h2 id="gran-total-dinero" style="margin:5px 0;">$0</h2></div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">📦 Inventario</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">💰 Vender</button>
            <button onclick="switchTab('stats')" id="tab-stats">📊 Reportes</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">⚙️ Gestión</button>
        </nav>
    </header>

    <main style="padding: 15px;">
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="color:#d63384; margin-top:0;">Registrar Venta</h3>
                <input type="text" id="busqueda-venta" placeholder="Escribe para filtrar..." onkeyup="filtrarSelectVentas()">
                <select id="select-producto" size="5" style="margin-top:10px;"></select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="width:30%"><label><small>Cant.</small></label><input type="number" id="cant-venta" value="1" min="1"></div>
                    <div style="width:70%"><label><small>Método</small></label>
                        <select id="metodo-pago">
                            <option value="💵 Efectivo">Efectivo</option>
                            <option value="📲 Transferencia">Transferencia</option>
                            <option value="⏳ Separado">Separado</option>
                            <option value="🛑 Fiado">Fiado</option>
                        </select>
                    </div>
                </div>
                <input type="text" id="nombre-cliente" placeholder="Nombre del cliente" style="margin-top:15px;">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp (Ej: 310...)" style="margin-top:10px;">
                <button onclick="registrarVenta()" style="width:100%; padding:15px; background:#d63384; color:white; border:none; border-radius:15px; font-weight:bold; margin-top:15px; cursor:pointer;">GENERAR VENTA Y FACTURA</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><h3 style="text-align:center;">Resumen de Métodos</h3><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="color:#d63384; margin-top:0;">🛑 Fiados Pendientes</h3>
                <table class="tabla-gestion"><thead><tr><th>Cliente</th><th>Acción</th></tr></thead><tbody id="lista-fiados"></tbody></table>
            </div>
            <div class="card">
                <h3 style="color:#f39c12; margin-top:0;">⏳ Separados</h3>
                <table class="tabla-gestion"><thead><tr><th>Cliente</th><th>Acción</th></tr></thead><tbody id="lista-separados"></tbody></table>
            </div>
            <div class="card" style="text-align:center;">
                <button onclick="window.open('https://drive.google.com/file/d/1FMtOGvlYbLwSofqO3WCkqG4k65MSzccn/view?usp=sharing', '_blank')" style="width:100%; padding:12px; background:#6610f2; color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:15px;">ABRIR CATÁLOGO</button>
                <button onclick="marketingMasivo()" style="width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:10px; font-weight:bold;">MARKETING MASIVO (CATÁLOGO)</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
