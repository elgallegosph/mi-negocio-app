<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #fff0f5; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%;
            width: 90%; height: 90%; max-width: 800px;
            background: url('./logo.png') no-repeat center;
            background-size: contain; transform: translate(-50%, -50%);
            opacity: 0.15; z-index: -1; pointer-events: none;
        }

        header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; }
        
        .banner-total { 
            background: linear-gradient(45deg, #d63384, #e83e8c); 
            padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; 
        }

        .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .tabs button { 
            padding: 12px; border-radius: 12px; border: none; font-weight: bold;
            background: rgba(255, 255, 255, 0.1); color: white; cursor: pointer;
        }
        .tabs button.active { background: #d63384 !important; }

        .card { 
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px; margin-bottom: 15px;
        }
        
        .lista-item { 
            background: rgba(255, 255, 255, 0.8); border-radius: 15px; padding: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }

        /* Animación de Carga */
        .btn-sync { 
            background: #d63384; color: white; border: none; padding: 10px; 
            border-radius: 50%; cursor: pointer; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loading { animation: spin 1s linear infinite; }

        .price-tag { color: #d63384; font-weight: 800; font-size: 1.2rem; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff0f5; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="./logo.png" alt="Logo" style="width:180px;">
        <h2 style="color: #d63384;">Amare Beauty</h2>
    </div>

    <header>
        <h1 style="margin:0;">Amare Beauty</h1>
        <div class="banner-total">
            <small>VENTA TOTAL REAL</small>
            <h2 id="gran-total-dinero" style="margin:5px 0;">$0</h2>
        </div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">📦 Inventario</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">💰 Ventas</button>
            <button onclick="switchTab('stats')" id="tab-stats">📊 Reportes</button>
            <button onclick="switchTab('catalogo')" id="tab-catalogo">📖 Catálogo</button>
        </nav>
    </header>

    <main style="padding: 15px;">
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; align-items: center; margin-bottom:15px;">
                <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()" style="margin:0;">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <input type="text" id="busqueda-venta" placeholder="Escribir producto..." onkeyup="filtrarSelectVentas()">
                <select id="select-producto" size="4"></select>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="cant-venta" value="1" min="1">
                    <select id="metodo-pago">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Separado">Separado</option>
                        <option value="Fiado">Fiado</option>
                    </select>
                </div>
                <input type="text" id="nombre-cliente" placeholder="Nombre cliente">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp">
                <button onclick="registrarVenta()" style="width:100%; padding:15px; background:#d63384; color:white; border:none; border-radius:12px; font-weight:bold;">REGISTRAR VENTA</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="text-align:center;">Métodos de Pago</h3>
                <canvas id="canvasMetodos"></canvas>
            </div>
        </section>

        <section id="sec-catalogo" class="tab-content" style="display:none;">
            <div class="card" style="text-align:center;">
                <button onclick="verCatalogo()" style="width:100%; padding:15px; background:#6610f2; color:white; border:none; border-radius:10px; margin-bottom:15px;">VER CATÁLOGO</button>
                <button onclick="enviarMarketingMasivo()" style="width:100%; padding:15px; background:#25d366; color:white; border:none; border-radius:10px;">COMPARTIR Y REGISTRAR</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
