<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #d63384; --dark: #2c3e50; --bg: #fff0f5; }
        body { background-color: var(--bg); margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative; }
        
        /* Marca de Agua en Fondo */
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 70vw; height: 70vw; max-width: 500px;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.15; z-index: -1; pointer-events: none;
        }

        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .banner-total { background: linear-gradient(135deg, var(--primary), #ff7eb3); padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; }
        
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .tabs button { padding: 10px 2px; border-radius: 10px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; cursor: pointer; }
        .tabs button.active { background: var(--primary) !important; box-shadow: 0 4px 10px rgba(214,51,132,0.4); }

        /* Contenedores con Transparencia para ver la marca de agua */
        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        
        .lista-item { background: rgba(255, 255, 255, 0.6); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(214, 51, 132, 0.1); }
        .sin-stock { opacity: 0.4; filter: grayscale(1); border-left: 4px solid #95a5a6; }

        .btn-sync { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); }

        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(214,51,132,0.3); }

        #splash-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="./logo.png" style="width:140px;"><h2 style="color:var(--primary);">Amare Beauty</h2></div>

    <header>
        <h1 style="margin:0; font-size:1.2rem;">AMARE BEAUTY</h1>
        <div class="banner-total">
            <small>VENTAS TOTALES REALES</small>
            <h2 id="gran-total-dinero" style="margin:5px 0;">$0</h2>
        </div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">STOCK</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">VENTA</button>
            <button onclick="switchTab('stats')" id="tab-stats">REPORTE</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">GESTIÓN</button>
        </nav>
    </header>

    <main style="padding: 15px;">
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <input type="text" id="busqueda-venta" placeholder="Buscar para vender..." onkeyup="filtrarSelectVentas()">
                <select id="select-producto" size="5" style="margin-top:10px;"></select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" id="cant-venta" value="1" min="1" style="width:30%;">
                    <select id="metodo-pago" style="width:70%;">
                        <option value="💵 Efectivo">Efectivo</option>
                        <option value="📲 Transferencia">Transferencia</option>
                        <option value="⏳ Separado">Separado</option>
                        <option value="🛑 Fiado">Fiado</option>
                    </select>
                </div>
                <input type="text" id="nombre-cliente" placeholder="Nombre cliente" style="margin-top:10px;">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp" style="margin-top:10px;">
                <button onclick="registrarVenta()" class="btn-main" style="margin-top:15px;">PROCESAR Y FACTURAR</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="color:var(--primary);">🛑 Fiados Pendientes</h3>
                <div id="lista-fiados"></div>
            </div>
            <div class="card">
                <h3 style="color:#f39c12;">⏳ Pedidos Separados</h3>
                <div id="lista-separados"></div>
            </div>
            <div class="card" style="text-align:center;">
                <button onclick="window.open('https://drive.google.com/file/d/1FMtOGvlYbLwSofqO3WCkqG4k65MSzccn/view?usp=sharing', '_blank')" style="background:#6610f2; color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; margin-bottom:10px;">CATÁLOGO </button>
                <button onclick="marketingMasivo()" style="background:#25d366; color:white; width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold;">MARKETING WHATSAPP</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
