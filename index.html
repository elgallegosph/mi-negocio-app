<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMARE BEAUTY</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #d63384; --dark: #2c3e50; --bg: #fff0f5; }
        body { background-color: var(--bg); margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; position: relative; }
        
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 70vw; height: 70vw;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.1; z-index: -1; pointer-events: none;
        }

        header { background: var(--dark); color: white; padding: 25px 15px; text-align: center; border-radius: 0 0 35px 35px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .banner-total { background: linear-gradient(135deg, var(--primary), #ff6eb4); padding: 15px; border-radius: 20px; margin: 10px auto; width: 85%; }
        
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 15px; }
        .tabs button { padding: 10px 2px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; cursor: pointer; }
        .tabs button.active { background: var(--primary); transform: scale(1.05); }

        .card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; margin: 10px; border: 1px solid rgba(255,255,255,0.4); }
        .lista-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        
        #carrito-conteo { background: white; color: var(--primary); padding: 2px 7px; border-radius: 50%; font-size: 0.7rem; margin-left: 5px; font-weight: bold; }
        #splash-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="./logo.png" style="width:150px;"><h2>AMARE BEAUTY</h2></div>

    <header>
        <h1 style="margin:0;">AMARE BEAUTY</h1>
        <div class="banner-total"><small>TOTAL VENTAS</small><h2 id="gran-total-dinero">$0</h2></div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">STOCK</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">CARRITO <span id="carrito-conteo">0</span></button>
            <button onclick="switchTab('stats')" id="tab-stats">REPORTE</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">GESTIÓN</button>
        </nav>
    </header>

    <main>
        <section id="sec-inventario" class="tab-content">
            <div class="card"><input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="renderInventario()"></div>
            <div id="lista-inventario" style="padding: 10px;"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <h3>🛒 Productos en Carrito</h3>
                <div id="carrito-vacio" style="text-align:center; padding:20px; color:#999;">Vacío</div>
                <div id="items-en-carrito"></div>
                <hr>
                <input type="text" id="nombre-cliente" placeholder="Nombre del Cliente">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp (Ej: 300...)">
                <select id="metodo-pago">
                    <option value="💵 Efectivo">Efectivo</option>
                    <option value="📲 Transferencia">Transferencia</option>
                    <option value="⏳ Separado">Separado</option>
                    <option value="🛑 Fiado">Fiado</option>
                </select>
                <button id="btn-procesar" onclick="registrarVentaMultiple()" class="btn-main">TERMINAR VENTA</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><h3 style="text-align:center;">Métodos de Pago</h3><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card"><h3>🛑 Deudas y Pendientes</h3><div id="lista-gestion"></div></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
