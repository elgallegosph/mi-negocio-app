<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Sistema Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #fff0f5; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 90%; height: 90%; max-width: 800px;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.1; z-index: -1; pointer-events: none;
        }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .banner-total { background: #d63384; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; box-shadow: 0 4px 10px rgba(214,51,132,0.3); }
        .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .tabs button { padding: 12px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; cursor: pointer; }
        .tabs button.active { background: #d63384 !important; }
        .card { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-radius: 20px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .lista-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #fce4ec; }
        .btn-sync { background: #d63384; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sin-stock { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .tabla-gestion { width: 100%; border-collapse: collapse; }
        .tabla-gestion th { background: #fce4ec; color: #d63384; padding: 10px; text-align: left; font-size: 0.8rem; }
        .tabla-gestion td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="./logo.png" style="width:150px;"><h2 style="color:#d63384;">Amare Beauty</h2></div>

    <header>
        <h1>Amare Beauty</h1>
        <div class="banner-total"><small>VENTA TOTAL REAL</small><h2 id="gran-total-dinero">$0</h2></div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">📦 Stock</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">💰 Venta</button>
            <button onclick="switchTab('stats')" id="tab-stats">📊 Reporte</button>
            <button onclick="switchTab('gestion')" id="tab-gestion">⚙️ Gestión</button>
        </nav>
    </header>

    <main style="padding: 15px;">
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="busqueda" placeholder="Buscar..." onkeyup="filtrarProductos()">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <input type="text" id="busqueda-venta" placeholder="Filtrar producto..." onkeyup="filtrarSelectVentas()">
                <select id="select-producto" size="5" style="margin-top:10px;"></select>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" id="cant-venta" value="1" min="1" style="width:30%;">
                    <select id="metodo-pago" style="width:70%;">
                        <option value="💵 Efectivo">Efectivo</option>
                        <option value="📲 Transferencia">Transferencia</option>
                        <option value="⏳ Separado">Separado</option>
                        <option value="🛑 Fiado">Fiado</option>
                    </select>
                </div>
                <input type="text" id="nombre-cliente" placeholder="Cliente" style="margin-top:10px;">
                <input type="tel" id="tel-cliente" placeholder="WhatsApp" style="margin-top:10px;">
                <button onclick="registrarVenta()" style="width:100%; padding:15px; background:#d63384; color:white; border:none; border-radius:15px; font-weight:bold; margin-top:15px;">REGISTRAR Y FACTURAR</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card"><h3 style="text-align:center;">Ventas por Método</h3><canvas id="canvasMetodos"></canvas></div>
        </section>

        <section id="sec-gestion" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="color:#d63384; margin-top:0;">🛑 Fiados</h3>
                <table class="tabla-gestion"><thead><tr><th>Cliente</th><th>Acción</th></tr></thead><tbody id="lista-fiados"></tbody></table>
            </div>
            <div class="card">
                <h3 style="color:#f39c12; margin-top:0;">⏳ Separados</h3>
                <table class="tabla-gestion"><thead><tr><th>Cliente</th><th>Acción</th></tr></thead><tbody id="lista-separados"></tbody></table>
            </div>
            <div class="card" style="text-align:center;">
                <button onclick="window.open('https://drive.google.com/file/d/1FMtOGvlYbLwSofqO3WCkqG4k65MSzccn/view?usp=sharing', '_blank')" style="width:100%; padding:12px; background:#6610f2; color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:10px;">VER CATÁLOGO</button>
                <button onclick="marketingMasivo()" style="width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:10px; font-weight:bold;">MARKETING MASIVO</button>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
