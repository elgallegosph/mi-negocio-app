<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #fff0f5; margin: 0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        body::before {
            content: ""; position: fixed; top: 50%; left: 50%; width: 90%; height: 90%; max-width: 800px;
            background: url('./logo.png') no-repeat center; background-size: contain;
            transform: translate(-50%, -50%); opacity: 0.12; z-index: -1; pointer-events: none;
        }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; }
        .banner-total { background: #d63384; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; box-shadow: 0 4px 10px rgba(214,51,132,0.3); }
        .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .tabs button { padding: 12px; border-radius: 12px; border: none; font-weight: bold; background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.3s; }
        .tabs button.active { background: #d63384 !important; }
        .card { background: rgba(255,255,255,0.75); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .lista-item { background: rgba(255,255,255,0.85); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(214,51,132,0.1); }
        .btn-sync { background: #d63384; color: white; border: none; padding: 10px; border-radius: 50%; cursor: pointer; width: 45px; height: 45px; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sin-stock { opacity: 0.5; filter: grayscale(1); }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: bold; color: #d63384; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="./logo.png" alt="Logo" style="width:180px;">
        <h2 style="color: #d63384;">Amare Beauty</h2>
    </div>

    <header>
        <h1>Amare Beauty</h1>
        <div class="banner-total">
            <small>VENTA TOTAL REAL</small>
            <h2 id="gran-total-dinero" style="margin:5px 0;">$0</h2>
        </div>
        <nav class="tabs">
            <button onclick="switchTab('inventario')" id="tab-inventario" class="active">📦 Inventario</button>
            <button onclick="switchTab('ventas')" id="tab-ventas">💰 Ventas</button>
            <button onclick="switchTab('stats')" id="tab-stats">📊 Reportes</button>
            <button onclick="switchTab('catalogo')" id="tab-catalogo">📖 Catálogo</button>
        </nav>
    </header>

    <main style="padding: 15px;">
        <section id="sec-inventario" class="tab-content">
            <div style="display:flex; gap:10px; align-items: center; margin-bottom:15px;">
                <input type="text" id="busqueda" placeholder="Buscar producto..." onkeyup="filtrarProductos()">
                <button onclick="cargarDesdeDrive()" class="btn-sync" id="btn-sync-icon">🔄</button>
            </div>
            <div id="lista-inventario"></div>
        </section>

        <section id="sec-ventas" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="margin-top:0; color:#d63384;">Nueva Venta</h3>
                <div class="input-group">
                    <label>Producto</label>
                    <input type="text" id="busqueda-venta" placeholder="Escribe para filtrar..." onkeyup="filtrarSelectVentas()" style="margin-bottom:8px;">
                    <select id="select-producto" size="4"></select>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="width:35%;">
                        <label>Cant.</label>
                        <input type="number" id="cant-venta" value="1" min="1">
                    </div>
                    <div class="input-group" style="width:65%;">
                        <label>Pago</label>
                        <select id="metodo-pago">
                            <option value="💵 Efectivo">Efectivo</option>
                            <option value="📲 Transferencia">Transferencia</option>
                            <option value="⏳ Separado">Separado</option>
                            <option value="🛑 Fiado">Fiado</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Cliente</label>
                    <input type="text" id="nombre-cliente" placeholder="Nombre" style="margin-bottom:10px;">
                    <input type="tel" id="tel-cliente" placeholder="WhatsApp">
                </div>
                <button onclick="registrarVenta()" style="width:100%; padding:15px; background:#d63384; color:white; border:none; border-radius:15px; font-weight:bold; font-size:1.1rem; cursor:pointer;">REGISTRAR VENTA</button>
            </div>
        </section>

        <section id="sec-stats" class="tab-content" style="display:none;">
            <div class="card">
                <h3 style="text-align:center; color:#2c3e50;">Métodos de Venta (Real)</h3>
                <div style="height: 300px; display: flex; justify-content: center;">
                    <canvas id="canvasMetodos"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-catalogo" class="tab-content" style="display:none;">
            <div class="card" style="text-align:center;">
                <button onclick="verCatalogo()" style="width:100%; padding:15px; background:#6610f2; color:white; border:none; border-radius:12px; font-weight:bold;">CATÁLOGO VIRTUAL</button>
                <hr style="margin:25px 0; border:0; border-top:1px solid #eee;">
                <h3>Marketing Directo</h3>
                <button onclick="marketingMasivo()" style="width:100%; padding:12px; background:#25d366; color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:15px;">ENVIAR CATÁLOGO A TODOS</button>
                <div id="lista-clientes-marketing" style="text-align:left; max-height: 250px; overflow-y: auto;"></div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
