<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amare Beauty - Dashboard</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Amare Beauty</h1>
            <div class="total-ventas-banner">
                <small>VENTA REAL ACUMULADA</small>
                <h2 id="gran-total-dinero">$0</h2>
            </div>
            <nav class="tabs">
                <button onclick="switchTab('inventario')" id="tab-inventario" class="active">Inventario</button>
                <button onclick="switchTab('ventas')" id="tab-ventas">Ventas</button>
                <button onclick="switchTab('stats')" id="tab-stats">Estadísticas</button>
            </nav>
        </header>

        <main>
            <section id="sec-inventario" class="tab-content">
                <div class="search-bar">
                    <input type="text" id="busqueda" placeholder="Buscar..." onkeyup="filtrarProductos()">
                    <button onclick="cargarDesdeDrive()" id="sync-btn">🔄</button>
                </div>
                <ul id="lista-inventario"></ul>
            </section>

            <section id="sec-ventas" class="tab-content" style="display:none;">
                <div class="venta-form">
                    <label>Producto:</label><select id="select-producto"></select>
                    <label>Cantidad:</label><input type="number" id="cant-venta" value="1" min="1">
                    <label>Pago:</label>
                    <select id="metodo-pago">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                    <button onclick="registrarVenta()" class="btn-save">REGISTRAR</button>
                </div>
            </section>

            <section id="sec-stats" class="tab-content" style="display:none; padding: 20px;">
                <div style="background: white; border-radius: 8px; padding: 10px; margin-bottom: 20px;">
                    <h3 style="color:#d63384; text-align:center;">📊 Métodos de Pago</h3>
                    <canvas id="canvasMetodos" style="max-height: 250px;"></canvas>
                </div>
                <div style="background: white; border-radius: 8px; padding: 10px;">
                    <h3 style="color:#6610f2; text-align:center;">🏆 Top 5 Productos</h3>
                    <canvas id="canvasTop5" style="max-height: 250px;"></canvas>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
